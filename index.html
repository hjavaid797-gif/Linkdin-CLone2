<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkdin-Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav">
            <div class="nav-logo">
               <div class="logo">
                <img src="imgs/Logo.png" alt="LinkedIn Logo">
               </div> 
            </div>
        </div>
    </header>
        <div class="form">
            <div class="form-box">
                <h1>Sign Up</h1>
                <div class="sign-in">
                    <button class="google">
                           <img src="imgs/Google logo.png" alt="google">
                           <span>Sign In With Google</span>
                    </button>
                    <button class="microsoft">
                           <img src="imgs/microsoft logo.png" alt="microsoft">
                           <span>Sign In With Microsoft</span>
                    </button>

                <button class="apple">
                           <img src="imgs/apple .png" alt="apple">
                           <span>Sign In With Apple</span>
                    </button>

                     <div class="agreement">
                        <p>By clicking Continue, you agree to LinkedIn’s <a href="#">User Agreement</a> <a href="#">Privacy Policy</a>,and <a href="#">Cookie Policy</a> .</p>
                     </div>

                     <div class="or-separator">
                        <span class="or">or</span>
                     </div>

                     <div class="signin-form">
                        <form action="Username"></form>
                        <input type="text" placeholder="Email OR Phone "  id="username">
                        <form action="Password"></form>
                        <input type="password" placeholder="password" id="password">
                     </div>
                     <div class="forget">
                        <a href="#">Forget Password</a>
                     </div>

                     <div class="keepme">
                        <input type="checkbox">
                        <label for="keep me">Keep me login</label>
                     </div>

                     <div class="signin-btn">
                        <button>Sign In</button>
                     </div>


                </div>
            </div>
        </div>
</body>
</html>
